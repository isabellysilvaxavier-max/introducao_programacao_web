<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOGO</title>
</head>
<body>
    <h2>Adivinhe o número de (1 a 10)</h2>
    <impute type="number" id="palpite">
    <button onclick="verificar()">Tentar</button>

    <p id="mensagem"></p>

    <script>

       let numeroSecreto = Math.floor(Math.random()*10) +1;
       let tentativas = 0;
 function verificar(){

    let palpite = Number(document.getElementById("palpite").valeu);
    tentativas ++;
    
    if(palpite === numeroSecreto) {
        document.getElementByI("mensagem").innerText =
        "Acertou em"+ tentativas +"tentativa";

    } else {
        document.getElementById("mensagem").innerText =
          "Errou! tente novamente.";
    }
}
   </script>

</body>
</html>
